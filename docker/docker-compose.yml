# version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-producao
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    user: "65534:65534"  # nobody:nobody user for Prometheus
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-producao
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      # - ./grafana/dashboards/VisaoExecutivaAmbienteVeeam.json:/var/lib/grafana/dashboards/VisaoExecutivaAmbienteVeeam.json:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info
    user: "472:472"  # grafana user id
    networks:
      - monitoring-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      # test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s  # Dá tempo para o Grafana iniciar

networks:
  monitoring-network:
    driver: bridge
    name: monitoring-network

volumes:
  prometheus-data:
    name: prometheus-data-producao
    driver: local
  grafana-data:
    name: grafana-data-producao
    driver: local